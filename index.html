<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {

      background: #f0f4f8;
      color: #333;
    }

    #tela-modulos { display: block; }

      background: #6c3fc5;
      color: white;
      padding: 30px 20px;
      text-align: center;
    }
    header h1 { font-size: 1.8rem; margin-bottom: 6px; }
    header p  { font-size: 0.95rem; opacity: 0.9; }

    .grade {
      max-width: 860px;
      margin: 30px auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-4px); }
    .card .icone { font-size: 2rem; margin-bottom: 10px; }
    .card h2 { font-size: 0.95rem; color: #6c3fc5; margin-bottom: 6px; }
    .card p  { font-size: 0.82rem; color: #666; }

    .aula-header {
      background: #6c3fc5;
      color: white;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn-voltar {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn-voltar:hover { background: rgba(255,255,255,0.35); }

    .aula-conteudo {
      max-width: 760px;
      margin: 30px auto;
      padding: 0 16px;
    }

    .bloco {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      line-height: 1.7;
    }
    .bloco h3 {
      color: #6c3fc5;
      margin-bottom: 12px;
      font-size: 1.1rem;
    }
    .bloco p { margin-bottom: 10px; font-size: 0.95rem; }
    .bloco ul { padding-left: 20px; font-size: 0.95rem; }
    .bloco ul li { margin-bottom: 6px; }

    .destaque {
      background: #f0eaff;
      border-left: 4px solid #6c3fc5;
      padding: 12px 16px;
      border-radius: 6px;
      margin: 14px 0;
      font-size: 0.92rem;
    }

    .quiz-pergunta {
      font-weight: bold;
      margin-bottom: 12px;
      font-size: 0.95rem;
    }
    .quiz-opcoes button {
      display: block;
      width: 100%;
      text-align: left;
      background: #f0f4f8;
      border: 2px solid #ddd;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .quiz-opcoes button:hover { background: #e8daff; }
    .quiz-opcoes button.certa  { background: #d4edda; border-color: #28a745; }
    .quiz-opcoes button.errada { background: #f8d7da; border-color: #dc3545; }
    .quiz-feedback {
      margin-top: 10px;
      font-size: 0.88rem;
      font-weight: bold;
    }

    .nav-aulas {
      display: flex;
      justify-content: space-between;
      margin: 10px 0 40px;
    }
    .btn-nav {
      background: #6c3fc5;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn-nav:disabled { background: #ccc; cursor: default; }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.78rem;
      color: #aaa;
    }

</head>

          <p>O quadro de tarefas é uma ferramenta visual que mostra o estado de cada tarefa da sprint. Ele tem colunas como <strong>A Fazer</strong>, <strong>Em Andamento</strong> e <strong>Concluído</strong>.</p>
          <p>À medida que o time trabalha, as tarefas vão avançando pelas colunas. Qualquer um pode ver em tempo real o que está acontecendo no projeto.</p>
        </div>
        <div class="bloco">
          <h3>Como o Backlog e o Quadro funcionam juntos</h3>
          <p>No início de cada sprint, o time pega os itens mais prioritários do backlog e os coloca na coluna "A Fazer" do quadro. Durante a sprint, as tarefas avançam até "Concluído". No final, os itens prontos são entregues ao cliente.</p>
        </div>
      `,
      quiz: {
        pergunta: "Quem é responsável por priorizar o Backlog do Produto?",
        opcoes: ["Scrum Master", "Time de Desenvolvimento", "Product Owner", "O cliente diretamente"],

        explicacao: "O Product Owner é responsável por manter e priorizar o backlog, decidindo quais itens têm mais valor para o cliente."

    },
    {
      icone: "🎯",
      titulo: "Aula 10 — Aprendendo a Priorizar",
      resumo: "Como decidir o que deve ser feito primeiro.",
      conteudo: `
        <div class="bloco">
          <h3>Por que priorizar é tão difícil?</h3>
          <p>Em um projeto, sempre há mais coisas para fazer do que tempo disponível. Priorizar significa tomar decisões difíceis sobre o que fica de fora — pelo menos por agora.</p>
        </div>
        <div class="bloco">
          <h3>Critérios para priorizar</h3>
          <ul>
            <li><strong>Valor para o cliente:</strong> o que gera mais resultado para quem vai usar o produto?</li>
            <li><strong>Urgência:</strong> o que precisa ser entregue mais rápido?</li>
            <li><strong>Risco:</strong> o que pode travar o projeto se não for feito antes?</li>
            <li><strong>Dependência:</strong> alguma tarefa depende de outra para começar?</li>
          </ul>
        </div>
        <div class="bloco">

        </div>
      `,
      quiz: {
        pergunta: "Na técnica MoSCoW, o que significa 'Must have'?",
        opcoes: [

          "Algo que definitivamente não será feito agora",
          "Algo que deve obrigatoriamente estar no produto",
          "Algo que depende da opinião do cliente"
        ],
        certa: 2,
        explicacao: "Must have são os requisitos obrigatórios, sem os quais o produto não funciona ou não atende ao objetivo principal."
      }
    },
    {

      resumo: "Visualizando o fluxo de trabalho com Kanban.",
      conteudo: `
        <div class="bloco">
          <h3>O que é Kanban?</h3>
          <p>Kanban é uma metodologia ágil que usa um quadro visual para gerenciar o fluxo de trabalho. O nome vem do japonês e significa "cartão visual". Foi criado pela Toyota nos anos 1950 para otimizar a produção de carros.</p>

          <p>O quadro tem colunas que representam o estado das tarefas. O mais básico tem três colunas: <strong>A Fazer</strong>, <strong>Fazendo</strong> e <strong>Feito</strong>. Cada tarefa é um cartão que avança pelas colunas.</p>
          <div class="destaque">👁️ O objetivo é que qualquer pessoa consiga entender o estado do projeto só de olhar para o quadro.</div>
        </div>
        <div class="bloco">
          <h3>Diferença entre Kanban e Scrum</h3>
          <p>O Scrum trabalha com sprints de tempo fixo e tem papéis definidos. O Kanban é mais flexível — não tem sprints, e as tarefas entram e saem do quadro de forma contínua. O Kanban é ideal para times que recebem demandas o tempo todo, como suporte técnico.</p>
        </div>
        <div class="bloco">
          <h3>Ferramentas Kanban gratuitas</h3>
          <p>As ferramentas mais populares para usar o Kanban online são o <strong>Trello</strong>, o <strong>Notion</strong> e o <strong>Jira</strong>. O Trello é o mais simples e indicado para quem está começando — é gratuito e muito fácil de usar.</p>
        </div>
      `,
      quiz: {
        pergunta: "De onde veio o método Kanban originalmente?",
        opcoes: [
          "De empresas de software americanas",
          "Do Manifesto Ágil de 2001",
          "Da Toyota, no Japão, nos anos 1950",
          "Do Google, para organizar projetos internos"
        ],
        certa: 2,
        explicacao: "O Kanban foi criado pela Toyota no Japão nos anos 1950 para otimizar a produção industrial antes de ser adotado pela área de software."
      }
    },
    {
      icone: "🛠️",
      titulo: "Aula 12 — Ferramentas Ágeis na Prática",
      resumo: "Trello, Calendly e Miro no dia a dia ágil.",
      conteudo: `
        <div class="bloco">
          <h3>Trello</h3>
          <p>O Trello é uma das ferramentas Kanban mais populares e intuitivas disponíveis online. Você cria quadros, listas e cartões para organizar qualquer tipo de projeto. É gratuito e funciona no celular e no computador.</p>
          <div class="destaque">🔗 Acesse em: trello.com — crie uma conta gratuita e monte seu primeiro quadro.</div>
        </div>
        <div class="bloco">
          <h3>Calendly</h3>
          <p>O Calendly é uma ferramenta de agendamento online. No contexto ágil, ele pode ser usado para marcar as Daily Scrums e outras reuniões da equipe de forma automática, sem precisar trocar dezenas de mensagens para achar um horário.</p>
          <div class="destaque">📅 Com o Calendly, você compartilha um link e a outra pessoa escolhe o horário disponível — simples assim.</div>
        </div>
        <div class="bloco">
          <h3>Miro</h3>
          <p>O Miro é uma lousa virtual colaborativa usada para criar frameworks ágeis, mapas mentais, fluxogramas e retrospectivas. Vários membros da equipe podem trabalhar no mesmo quadro ao mesmo tempo, mesmo estando em lugares diferentes.</p>
          <div class="destaque">🎨 O Miro é muito usado para Retrospectivas de Sprint e para criar o Backlog visualmente com toda a equipe.</div>

        <div class="bloco">
          <h3>Lean</h3>
          <p>Lean é uma filosofia de trabalho focada em eliminar desperdícios. A ideia é fazer mais com menos: menos tempo perdido, menos retrabalho, menos funcionalidades desnecessárias. O Lean influenciou diretamente o Manifesto Ágil.</p>
        </div>
      `,
      quiz: {
        pergunta: "Para que serve o Miro no contexto de metodologias ágeis?",
        opcoes: [
          "Para marcar reuniões automaticamente",
          "Para criar quadros Kanban com cartões e listas",
          "Para criar frameworks ágeis e colaborar visualmente em tempo real",
          "Para gerenciar o backlog do produto"
        ],
        certa: 2,
        explicacao: "O Miro é uma lousa virtual colaborativa usada para criar frameworks ágeis, retrospectivas e mapas mentais com toda a equipe."
      }
    },
    {
      icone: "🏆",
      titulo: "Aula 13 — A Importância das Metodologias Ágeis",
      resumo: "Por que as organizações modernas adotam a agilidade.",
      conteudo: `
        <div class="bloco">
          <h3>Agilidade como vantagem competitiva</h3>
          <p>Empresas que adotam metodologias ágeis conseguem lançar produtos mais rápido, responder melhor às necessidades dos clientes e se adaptar às mudanças do mercado com mais facilidade do que concorrentes que usam modelos tradicionais.</p>
        </div>
        <div class="bloco">
          <h3>Resultados comprovados</h3>
          <p>Pesquisas mostram que projetos ágeis têm mais chances de serem concluídos no prazo e dentro do orçamento do que projetos tradicionais. Além disso, a satisfação dos clientes e das equipes tende a ser maior.</p>
          <div class="destaque">📈 Segundo o Standish Group, projetos ágeis têm 3x mais chances de sucesso do que projetos tradicionais.</div>
        </div>
        <div class="bloco">
          <h3>Agilidade além da tecnologia</h3>
          <p>Hospitais usam metodologias ágeis para melhorar o atendimento. Escolas usam para redesenhar currículos. Startups usam para testar ideias de negócio rapidamente. A agilidade se tornou uma competência essencial para qualquer organização do século XXI.</p>
        </div>
        <div class="bloco">
          <h3>O futuro é ágil</h3>
          <p>Com o aumento da inteligência artificial, da automação e da velocidade das mudanças tecnológicas, profissionais que sabem trabalhar de forma ágil e adaptável serão cada vez mais valorizados. Aprender sobre metodologias ágeis agora é investir no seu futuro.</p>
          <div class="destaque">🚀 Você já deu o primeiro passo completando este curso. Continue praticando!</div>
        </div>
      `,
      quiz: {
        pergunta: "Segundo pesquisas, projetos ágeis têm quantas vezes mais chance de sucesso que projetos tradicionais?",
        opcoes: ["2 vezes", "3 vezes", "5 vezes", "10 vezes"],
        certa: 1,
        explicacao: "Segundo o Standish Group, projetos ágeis têm 3 vezes mais chances de sucesso do que projetos que usam metodologias tradicionais."
      }
    }
  ];

  // RENDERIZAR CARDS
  const grade = document.getElementById('grade-cards');
  aulas.forEach((aula, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="icone">${aula.icone}</div>
      <h2>${aula.titulo}</h2>
      <p>${aula.resumo}</p>
    `;
    card.onclick = () => abrirAula(i);
    grade.appendChild(card);
  });

  let aulaAtual = 0;

  function abrirAula(index) {
    aulaAtual = index;
    const aula = aulas[index];
    document.getElementById('tela-modulos').style.display = 'none';
    document.getElementById('tela-aula').style.display = 'block';
    document.getElementById('titulo-aula').textContent = aula.titulo;
    window.scrollTo(0, 0);

    const q = aula.quiz;
    const opcoesHTML = q.opcoes.map((op, i) =>
      `<button onclick="responder(this, ${i}, ${q.certa})">${op}</button>`
    ).join('');

    document.getElementById('aula-conteudo').innerHTML = `
      ${aula.conteudo}
      <div class="bloco">
        <h3>📝 Quiz Rápido</h3>
        <p class="quiz-pergunta">${q.pergunta}</p>
        <div class="quiz-opcoes" id="quiz-opcoes">${opcoesHTML}</div>
        <div class="quiz-feedback" id="quiz-feedback"></div>
      </div>
      <div class="nav-aulas">
        <button class="btn-nav" onclick="abrirAula(${index - 1})" ${index === 0 ? 'disabled' : ''}>← Anterior</button>
        <button class="btn-nav" onclick="abrirAula(${index + 1})" ${index === aulas.length - 1 ? 'disabled' : ''}>Próxima →</button>
      </div>
    `;
  }

  function responder(btn, escolha, certa) {
    const botoes = document.querySelectorAll('.quiz-opcoes button');
    botoes.forEach(b => b.disabled = true);
    const feedback = document.getElementById('quiz-feedback');
    if (escolha === certa) {
      btn.classList.add('certa');
      feedback.style.color = '#28a745';
      feedback.textContent = '✅ Correto! ' + aulas[aulaAtual].quiz.explicacao;
    } else {
      btn.classList.add('errada');
      botoes[certa].classList.add('certa');
      feedback.style.color = '#dc3545';
      feedback.textContent = '❌ Errado. ' + aulas[aulaAtual].quiz.explicacao;
    }
  }

  function voltarMenu() {
    document.getElementById('tela-modulos').style.display = 'block';
    document.getElementById('tela-aula').style.display = 'none';
    window.scrollTo(0, 0);
  }
</script>
</body>
</html>
